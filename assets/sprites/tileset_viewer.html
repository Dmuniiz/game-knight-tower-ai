<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dungeon Tileset — Mapa de Coordenadas</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d0f;
    color: #e8e0d0;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    padding: 32px 24px;
  }

  h1 {
    font-size: 1.1rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #c8a96e;
    margin-bottom: 6px;
  }

  p.sub {
    font-size: 0.72rem;
    color: #666;
    margin-bottom: 28px;
    letter-spacing: 0.05em;
  }

  #controls {
    display: flex;
    gap: 16px;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  label { font-size: 0.75rem; color: #888; }

  input[type=range] {
    accent-color: #c8a96e;
    width: 140px;
  }

  #scale-val {
    font-size: 0.8rem;
    color: #c8a96e;
    min-width: 30px;
  }

  #upload-label {
    display: inline-block;
    padding: 7px 16px;
    background: #1e1c18;
    border: 1px solid #3a3630;
    color: #c8a96e;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: background 0.15s;
  }
  #upload-label:hover { background: #2a2820; }
  #file-input { display: none; }

  #canvas-wrap {
    position: relative;
    display: inline-block;
    border: 1px solid #2a2820;
    background: #111;
    image-rendering: pixelated;
  }

  canvas { display: block; image-rendering: pixelated; }

  #tooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(10,9,8,0.92);
    border: 1px solid #c8a96e55;
    color: #c8a96e;
    font-size: 0.7rem;
    padding: 5px 10px;
    letter-spacing: 0.08em;
    display: none;
    z-index: 100;
  }

  #info {
    margin-top: 20px;
    font-size: 0.72rem;
    color: #555;
    line-height: 1.8;
  }
  #info span { color: #c8a96e; }

  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 480px;
    height: 280px;
    border: 2px dashed #2a2820;
    color: #444;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    gap: 10px;
  }

  .placeholder svg { opacity: 0.3; }
</style>
</head>
<body>

<h1>Dungeon Tileset — Mapa de Coordenadas</h1>
<p class="sub">Faça upload do Dungeon_Tileset.png para ver as coordenadas (col, row) de cada tile</p>

<div id="controls">
  <label for="file-input">
    <span id="upload-label">📁 Carregar Tileset</span>
  </label>
  <input type="file" id="file-input" accept="image/*">

  <label>Zoom:
    <input type="range" id="scale" min="2" max="8" value="4" step="1">
    <span id="scale-val">4×</span>
  </label>

  <label>Tile size (px):
    <input type="range" id="tsize" min="8" max="32" value="16" step="8">
    <span id="tsize-val">16</span>
  </label>
</div>

<div id="canvas-wrap">
  <div class="placeholder" id="placeholder">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#c8a96e" stroke-width="1.5">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <path d="M3 9h18M9 21V9"/>
    </svg>
    Carregue o Dungeon_Tileset.png acima
  </div>
  <canvas id="cv" style="display:none;"></canvas>
</div>

<div id="tooltip"></div>

<div id="info">
  Passe o mouse sobre um tile para ver as coordenadas •
  Use <span>get_tile(dungeon, col, row)</span> no seu código
</div>

<script>
const fileInput  = document.getElementById('file-input');
const uploadLabel = document.getElementById('upload-label');
const scaleSlider = document.getElementById('scale');
const tsizeSlider = document.getElementById('tsize');
const scaleVal   = document.getElementById('scale-val');
const tsizeVal   = document.getElementById('tsize-val');
const cv         = document.getElementById('cv');
const ctx        = cv.getContext('2d');
const tooltip    = document.getElementById('tooltip');
const placeholder = document.getElementById('placeholder');

let img = null;
let SCALE = 4;
let TW = 16;  // tile width in source pixels
let TH = 16;  // tile height in source pixels

fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  uploadLabel.textContent = '✓ ' + file.name;
  const url = URL.createObjectURL(file);
  const image = new Image();
  image.onload = () => {
    img = image;
    draw();
  };
  image.src = url;
});

scaleSlider.addEventListener('input', () => {
  SCALE = parseInt(scaleSlider.value);
  scaleVal.textContent = SCALE + '×';
  if (img) draw();
});

tsizeSlider.addEventListener('input', () => {
  TW = TH = parseInt(tsizeSlider.value);
  tsizeVal.textContent = TW;
  if (img) draw();
});

function draw() {
  if (!img) return;

  placeholder.style.display = 'none';
  cv.style.display = 'block';

  const cols = Math.floor(img.width  / TW);
  const rows = Math.floor(img.height / TH);

  const W = cols * TW * SCALE;
  const H = rows * TH * SCALE;

  cv.width  = W;
  cv.height = H;

  ctx.imageSmoothingEnabled = false;

  // Draw scaled tileset
  ctx.drawImage(img, 0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = 'rgba(200,169,110,0.35)';
  ctx.lineWidth = 1;
  for (let c = 0; c <= cols; c++) {
    ctx.beginPath();
    ctx.moveTo(c * TW * SCALE, 0);
    ctx.lineTo(c * TW * SCALE, H);
    ctx.stroke();
  }
  for (let r = 0; r <= rows; r++) {
    ctx.beginPath();
    ctx.moveTo(0, r * TH * SCALE);
    ctx.lineTo(W, r * TH * SCALE);
    ctx.stroke();
  }

  // Labels (col,row)
  const fontSize = Math.max(7, Math.min(11, TW * SCALE * 0.28));
  ctx.font = `bold ${fontSize}px 'Courier New'`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cx = c * TW * SCALE + (TW * SCALE) / 2;
      const cy = r * TH * SCALE + (TH * SCALE) / 2;
      const label = `${c},${r}`;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillText(label, cx + 1, cy + 1);

      // Text
      ctx.fillStyle = '#f0e060';
      ctx.fillText(label, cx, cy);
    }
  }
}

// Tooltip on hover
cv.addEventListener('mousemove', e => {
  if (!img) return;
  const rect = cv.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const col = Math.floor(mx / (TW * SCALE));
  const row = Math.floor(my / (TH * SCALE));

  tooltip.style.display = 'block';
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top  = (e.clientY - 10) + 'px';
  tooltip.textContent = `get_tile(dungeon, ${col}, ${row})`;
});

cv.addEventListener('mouseleave', () => {
  tooltip.style.display = 'none';
});

// Click to copy
cv.addEventListener('click', e => {
  if (!img) return;
  const rect = cv.getBoundingClientRect();
  const col = Math.floor((e.clientX - rect.left) / (TW * SCALE));
  const row = Math.floor((e.clientY - rect.top)  / (TH * SCALE));
  const text = `get_tile(dungeon, ${col}, ${row})`;
  navigator.clipboard.writeText(text).then(() => {
    tooltip.textContent = '✓ copiado!';
    setTimeout(() => { tooltip.textContent = text; }, 900);
  });
});
</script>
</body>
</html>
